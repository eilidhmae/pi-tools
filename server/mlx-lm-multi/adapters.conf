# adapters.conf — one line per hot adapter.
# Format:  <suffix>  <port>  <adapter_path>
# The base model is always served on the lowest port automatically.
# Suffix maps to the model id "qwen3-coder-30b-a3b+<suffix>".
# Comments and blank lines ignored.

# Examples (uncomment when adapters are released and downloaded):
# go         8081  ~/models/adapters/worker-go
# adversary  8082  ~/models/adapters/adversary-general
# rust       8083  ~/models/adapters/worker-rust
# python     8084  ~/models/adapters/worker-python
# tf         8085  ~/models/adapters/worker-tf
