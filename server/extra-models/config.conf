# config.conf — one line per side-by-side mlx_lm.server.
# Format:  <short-name>  <port>  <hf-repo-id>  [max-tokens]
#
# Each row tells mlx-server.sh to:
#   - start an `mlx_lm.server` process on <port> serving <hf-repo-id>
#     from the local HuggingFace cache (run `hf download <repo>` first)
#   - cap generation at [max-tokens] (4th column, optional). When absent
#     the row inherits $MAX_TOKENS (default 32768). mlx_lm.server's own
#     default is 512, which truncates long answers — hence the floor.
#   - log to    extra-models/logs/<short-name>.log
#   - pidfile   extra-models/pids/<short-name>.pid
#   - expose via models.json as a sibling provider — operator wires
#     `local-mlx-<short-name>` in models.json themselves (the launcher
#     does not edit models.json; see server/README.md for the snippet).
#
# Comments (lines starting with #) and blank lines are ignored.
#
# Examples (uncomment when the model is downloaded into the HF cache):
# codestral    18100  mlx-community/Codestral-22B-v0.1-4bit
# deepseek-v2  18101  mlx-community/DeepSeek-Coder-V2-Lite-Instruct-4bit-mlx
# codellama    18102  mlx-community/CodeLlama-34b-Instruct-hf-4bit-mlx

# Active: Qwen3.6-35B-A3B 8-bit — session/adversary track candidate.
# Heavy thinking model: it spends budget on <think> before the answer, so it
# needs a generous ceiling or long replies get cut off (and a too-small cap
# can return an empty body). Inherits the 32768 default below; add a 4th
# column to override per-row. To suppress thinking entirely, send
# chat_template_kwargs.enable_thinking=false (pi's --thinking flag does NOT
# reach this backend; see provider compat).
q36          18110  mlx-community/Qwen3.6-35B-A3B-8bit

# Active: Qwen2.5-Coder-32B-Instruct 8-bit — the RPI Code Worker / Implementor
# backend (dense coder, ~35GB, non-thinking). Served on :18111; the
# `local-mlx-qwen25coder32b` provider in models.json points here, and the
# coder-run.sh worker pins this exact model id. Bring up on its own with
# `mlx-server.sh up qwen25coder32b` (bare `up` also starts it).
qwen25coder32b 18111 mlx-community/Qwen2.5-Coder-32B-Instruct-8bit
