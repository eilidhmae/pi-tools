# llama.conf — one row per llama.cpp `llama-server` MTP speculative-decode
# backend, launched by ../llama-server.sh (sibling to mlx-server.sh; see its
# header for why the two launchers are separate).
#
# Format:  <name>  <port>  <hf-repo>  <main-gguf-relpath>  <draft-gguf-relpath>  [n-draft]  [ctx]
#   - <hf-repo>             : HF repo id; resolved to its snapshot dir in the
#                            local cache (run `hf download <repo> <file>` first).
#   - <main-gguf-relpath>   : main model GGUF, relative to the snapshot dir.
#   - <draft-gguf-relpath>  : the MTP draft GGUF (the speculative head),
#                            relative to the snapshot dir (unsloth ships it
#                            under MTP/ in the same repo).
#   - [n-draft]             : --spec-draft-n-max (default 2 — the agentic sweet
#                            spot on this M5 Max; K=3/4 add acceptance but lose
#                            throughput to verify cost).
#   - [ctx]                 : -c context window. llama.cpp PRE-ALLOCATES KV for
#                            the full ctx (unlike mlx_lm.server, which grows it),
#                            so this is a memory/​headroom trade-off. The
#                            gemma4-llama row sets 262144 — the model's full native
#                            context, matching the mlx gemma4 row (~40 GB total on
#                            this M5 Max; Test-4 ceiling: 32k≈23 GB, 131k≈30 GB,
#                            262k≈40 GB — full context costs only ~10 GB over 131k).
#                            8192 is too small for a real session once the harness
#                            rehydrates memory + ABOUT_ME/CLAUDE.md (~10 K alone).
#                            Omitted column falls back to LLAMA_CTX (default 8192).
#
# The launcher always adds: --spec-type draft-mtp -ngl 999 -fa on --jinja
# --reasoning off --alias <repo-leaf>.  `--reasoning off` matches the
# non-thinking gemma4 contract and keeps reasoning_content out of the response
# (pi gets plain content + native tool_calls). The pi provider model id is the
# repo leaf (here: gemma-4-31B-it-qat-GGUF) — see models.json.template
# `local-llama-gemma4`.
#
# Comments (#) and blank lines are ignored.
#
# WHY this row exists: the 2026-06-25 definitive MTP matrix (my-macbook
# DECISIONS/CHANGELOG 2026-06-25) showed Gemma-4 QAT drafting pays off via
# llama.cpp (1.65–1.77×, no 1024-window cliff, loop-safe) but NOT via the
# mlx-lm spec-decode path on the served QAT model. This row is the deploy
# candidate, parallel to the mlx `gemma4` row on :18112 (left intact); it does
# not flip any coder/adversary default — opt in with `llama-server.sh up
# gemma4-llama` and point a pi session at the `local-llama-gemma4` provider.

gemma4-llama 18113 unsloth/gemma-4-31B-it-qat-GGUF gemma-4-31B-it-qat-UD-Q4_K_XL.gguf MTP/gemma-4-31B-it-Q4_0-MTP.gguf 2 262144
